# Phantom — Ergogen recreation (faithful baseline)
#
# Recreates davidphilipbarr/Phantom (single reversible Choc board) as a
# standard mirrored left/right pair in Ergogen.
#
# Source of truth for geometry: lephantom.kicad_pcb switch coordinates
# (idealised into clean stagger/spread/splay — matches originals to <1 mm).
# Source of truth for wiring: jonnyirwin/phantom_qmk_config (QMK DIRECT_PINS).
#
# Baseline = original hardware: Pro Micro, TRRS split, hotswap Choc, NO diodes
# (each switch wired straight to one Pro Micro GPIO + GND), reset button.
# Trackball intentionally omitted.
#
# Pin map: QMK atmega label -> Arduino Pro Micro pin -> Ergogen promicro net.
#   E6=P7  F7=P18 F6=P19 F5=P20 F4=P21  B1=P15 B3=P14 B2=P16 B6=P10
#   D7=P6  D4=P4  C6=P5  D3=P3  B4=P8  B5=P9   (serial D2=P2)

units:
  # Kailh Choc v1 spacing used by the Phantom
  kx: 18
  ky: 17
  # keycap preview size
  capx: 17.5
  capy: 16.5

points:
  zones:
    # Straight columns (no splay). Anchor origin = middle-bottom key.
    # The splayed pinky/ring columns live in their own zones (below) so their
    # rotation does not cascade into these straight columns.
    matrix:
      key:
        padding: ky
        spread: kx
        width: capx
        height: capy
        tags:
          key: true
      columns:
        middle:
          key.stagger: 0
          key.col_net: C2
          rows:
            bottom: { row_net: R2 }
            home:   { row_net: R1 }
            top:    { row_net: R0 }
        index:
          key.stagger: -3.6
          key.col_net: C3
          rows:
            bottom: { row_net: R2 }
            home:   { row_net: R1 }
            top:    { row_net: R0 }
        inner:
          key.stagger: 8.3       # cumulative: +4.7 absolute after index's -3.6
          key.col_net: C4
          rows:
            bottom: { row_net: R2 }   # lower
            home:   { row_net: R1 }   # upper
    # Ring column: rigid 3° splay, pivoting about its bottom key.
    ring:
      anchor:
        ref: matrix_middle_bottom
        shift: [-18.3, -3.15]
        rotate: 3
      key:
        padding: ky
        spread: kx
        width: capx
        height: capy
        tags:
          key: true
      columns:
        ring:
          key.col_net: C1
          rows:
            bottom: { row_net: R2 }
            home:   { row_net: R1 }
            top:    { row_net: R0 }
    # Pinky column: rigid 5° splay, 2 keys (home + bottom).
    pinky:
      anchor:
        ref: matrix_middle_bottom
        shift: [-37.0, 0.53]
        rotate: 5
      key:
        padding: ky
        spread: kx
        width: capx
        height: capy
        tags:
          key: true
      columns:
        pinky:
          key.col_net: C0
          rows:
            bottom: { row_net: R2 }   # lower
            home:   { row_net: R1 }   # upper
    # Thumb cluster: 2 keys, rotated -8°, below the index column.
    thumb:
      anchor:
        ref: matrix_index_bottom
        shift: [6, -20.5]
        rotate: -8
      key:
        padding: ky
        spread: kx
        width: capx
        height: capy
        tags:
          key: true
      columns:
        left:
          key.col_net: C3
          rows:
            thumb: { row_net: R3 }   # B4 position
        right:
          key.col_net: C4
          rows:
            thumb: { row_net: R3 }   # B5 position
  # Mirror every point across an axis to the right of the board, creating
  # `mirror_*` copies for the right half. Ergogen auto-flips footprints/sides.
  mirror:
    ref: matrix_middle_bottom
    shift: [85, 0]

outlines:
  # raw key footprints (plate cutouts can be derived from these later)
  _keys:
    keys:
      what: rectangle
      where: true
      size: [capx, capy]
  # board / case perimeter — the original lephantom.kicad_pcb Edge.Cuts traced
  # exactly as line + arc segments, so the rounded corners (R ~9.5-11.6mm) are
  # reproduced rather than approximated. Expressed relative to the middle-bottom key.
  board_left:
    perimeter:
      what: path
      segments:
        - type: line
          points:
            - { ref: matrix_middle_bottom, shift: [-36.312, -30.184] }
            - { ref: matrix_middle_bottom, shift: [43.190, -39.836] }
        - type: arc
          points:
            - { ref: matrix_middle_bottom, shift: [47.498, -38.894] }
            - { ref: matrix_middle_bottom, shift: [50.914, -36.106] }
        - type: line
          points:
            - { ref: matrix_middle_bottom, shift: [67.272, -7.832] }   # +pcb_pad: vertical edge, lower
        - type: line
          points:
            - { ref: matrix_middle_bottom, shift: [67.189, 25.872] }   # Pc: vertical edge meets diagonal
        - type: line
          points:
            - { ref: matrix_middle_bottom, shift: [30.723, 42.761] }   # T: tangent point (diagonal)
        - type: arc
          points:
            - { ref: matrix_middle_bottom, shift: [28.435, 43.519] }   # M on new fillet
            - { ref: matrix_middle_bottom, shift: [26.034, 44.033] }   # P2' +0.3mm outward relief: matches board_right so the halves stay exact mirror shapes (one case, printed mirrored)
        - type: line
          points:
            - { ref: matrix_middle_bottom, shift: [-40.376, 42.252] }   # +0.3mm outward relief (paired with the point above)
        - type: arc
          points:
            - { ref: matrix_middle_bottom, shift: [-46.646, 38.369] }
            - { ref: matrix_middle_bottom, shift: [-49.802, 31.578] }   # +0.7mm outward relief: matches board_right's pinky relief so the halves stay exact mirror shapes
        - type: line
          points:
            - { ref: matrix_middle_bottom, shift: [-45.685, -20.939] }   # +0.7mm outward relief (paired with the point above)
        - type: arc
          points:
            - { ref: matrix_middle_bottom, shift: [-42.022, -26.850] }
            - { ref: matrix_middle_bottom, shift: [-36.312, -30.184] }
  # Right half: the same boundary, anchored at the mirrored origin
  # (mirror_matrix_middle_bottom). Ergogen already flips x for a mirror_* ref, so
  # the shifts here are IDENTICAL to board_left (NOT pre-negated) — pre-negating
  # double-flipped them and pushed the outline ~18mm off the components.
  board_right:
    perimeter:
      what: path
      segments:
        - type: line
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [-36.312, -30.184] }
            - { ref: mirror_matrix_middle_bottom, shift: [43.190, -39.836] }
        - type: arc
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [47.498, -38.894] }
            - { ref: mirror_matrix_middle_bottom, shift: [50.914, -36.106] }
        - type: line
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [67.272, -7.832] }   # +pcb_pad
        - type: line
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [67.189, 25.872] }   # Pc
        - type: line
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [30.723, 42.761] }   # T
        - type: arc
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [28.435, 43.519] }   # M
            - { ref: mirror_matrix_middle_bottom, shift: [26.034, 44.033] }   # P2' +0.3mm outward relief: switch footprints keep socket orientation under mirror, so the apex key's hotswap drill sits 0.13mm too close to this edge for the two routing lanes that pass it
        - type: line
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [-40.376, 42.252] }   # +0.3mm outward relief (paired with the point above)
        - type: arc
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [-46.646, 38.369] }
            - { ref: mirror_matrix_middle_bottom, shift: [-49.802, 31.578] }   # +0.7mm outward relief: pinky pads (S12/S13) keep socket orientation under mirror, so pad 2 reaches this outer edge
        - type: line
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [-45.685, -20.939] }   # +0.7mm outward relief (paired with the point above)
        - type: arc
          points:
            - { ref: mirror_matrix_middle_bottom, shift: [-42.022, -26.850] }
            - { ref: mirror_matrix_middle_bottom, shift: [-36.312, -30.184] }

  # ---- case feature outlines (left half), consumed by case/case_left.scad ----
  # Top switch plate: board minus 14mm Choc plate cutouts.
  plate_left:
    base:
      what: outline
      name: board_left
    holes:
      what: rectangle
      where: "-/^mirror_/"
      size: 14
      operation: subtract
  # Hotswap socket cutouts for the FLAT bottom plate: one per key, sized/located
  # to the Choc hotswap socket (pads + pin holes sit to one side of the switch).
  socketpockets_left:
    pk:
      what: rectangle
      where: "-/^mirror_/"
      size: [15, 6.5]
      corner: 1
      adjust:
        shift: [2.5, 4.85]
  # Merged key-cluster region (keycap rects overlapped into one blob) — the
  # recess where the sunken keycaps sit nearly flush with the raised case top.
  keyfield_left:
    kf:
      what: rectangle
      where: "-/^mirror_/"
      size: [19, 18]
      corner: 1.5
  # Per-key keycap openings — the recess is split into wells by thin ribs
  # (ribs = keyfield minus these openings).
  keycaps_left:
    kc:
      what: rectangle
      where: "-/^mirror_/"
      size: [17.6, 16.6]
      corner: 1

pcbs:
  # Left half places footprints on the source points; right half (phantom_right)
  # reuses the same definitions with asym=clone / a mirror-name filter, so Ergogen
  # auto-flips footprint sides and x-offsets onto the mirrored points.
  # Each half is an independent wireless unit: its own XIAO BLE + battery +
  # power switch (no TRRS). Diode matrix (COL2ROW): switch joins col_net to a
  # per-key node; the diode joins that node to row_net.
  # XIAO GPIO: cols C0-C4 -> D0-D4, rows R0-R3 -> D5-D8.
  # Power: battery+ -> RAW_BATT -> power switch -> BATT -> XIAO B+; battery- -> GND.
  phantom_left:
    outlines:
      main:
        outline: board_left
    footprints:
      switches:
        what: choc
        where: &left_keys "-/^mirror_/"
        params: &choc_params
          reverse: false      # two distinct mirrored boards, not one reversible board
          hotswap: true
          keycaps: true
          from: "{{col_net}}"
          to: "{{name}}"
      diodes:
        what: diode_sod123
        where: *left_keys
        adjust:
          shift: [0, -4.70]  # centre of the Choc v1 LED cutout: the body window
                             # spans y 3.075..6.325, x +/-2.65 (ceoloide choc
                             # footprint reference); the old -5.95 (contact-row
                             # offset) left the diode body 1.25mm south of
                             # centre, fouling the housing wall
        params: &diode_params
          from: "{{name}}"    # COL2ROW: node -> diode -> row
          to: "{{row_net}}"
      mcu:
        what: xiao_ble
        where: &mcu_where
          ref: matrix_inner_home
          shift: [21, -6.73]  # KiCad (137, 44): right of the inner column, near the top-right
          rotate: 0           # USB + antenna toward the top edge (USB access + BLE)
        params: &mcu_params
          D0: C0
          D1: C1
          D2: C2
          D3: C3
          D4: C4
          D5: R0
          D6: R1
          D7: R2
          D8: R3
          BAT: BATT
      battery:
        what: battery
        where: &battery_where
          ref: matrix_inner_home
          shift: [-71.5, -42.73]  # KiCad (44.5, 80): -x wire-well end of battery_pocket()
          rotate: 0
        params: &battery_params
          P: RAW_BATT
          N: GND
      power:
        what: power_switch
        where: &power_where
          ref: matrix_inner_home
          shift: [29.5, -23]  # KiCad (145.5, 60.27): body right edge ~ PCB edge after pcb_pad
          rotate: -90         # below the XIAO; MSK-12D19 actuator overhangs the right side
        params: &power_params
          A: RAW_BATT         # from battery +
          B: BATT             # to XIAO B+
          C: PWR_NC           # off position (unconnected)
      # M2 case-to-case mounting holes — positions mirror bolts[] in phantom_case.scad.
      # Shift = [case_x - 116, 37.27 - case_y], where case->board is (x-80, y-58.97)
      # and matrix_inner_home sits at board (36, -21.70). (The earlier y-shifts were
      # sign-flipped — Ergogen y-up vs KiCad y-down — placing these off the board.)
      mount_tl:
        what: mounting_hole_m2
        where: &mount_tl_where
          ref: matrix_inner_home
          shift: [-79, 15.27]   # KiCad (37, 22)
      mount_tr:
        what: mounting_hole_m2
        where: &mount_tr_where
          ref: matrix_inner_home
          shift: [-1, 13.27]    # KiCad (115, 24)
      mount_bl:
        what: mounting_hole_m2
        where: &mount_bl_where
          ref: matrix_inner_home
          shift: [-78, -44.73]  # KiCad (38, 82)
      mount_br:
        what: mounting_hole_m2
        where: &mount_br_where
          ref: matrix_inner_home
          shift: [21, -40.73]   # KiCad (137, 78)
  phantom_right:
    outlines:
      main:
        outline: board_right
    footprints:
      switches:
        what: choc
        where: &right_keys "/^mirror_/"
        params: *choc_params
      diodes:
        what: diode_sod123
        where: *right_keys
        adjust:
          shift: [0, -4.70]  # centre of the Choc v1 LED cutout: the body window
                             # spans y 3.075..6.325, x +/-2.65 (ceoloide choc
                             # footprint reference); the old -5.95 (contact-row
                             # offset) left the diode body 1.25mm south of
                             # centre, fouling the housing wall
        params: *diode_params
      mcu:
        what: xiao_ble
        where: *mcu_where
        asym: clone
        params: *mcu_params
      battery:
        what: battery
        where: *battery_where
        asym: clone
        params: *battery_params
      power:
        what: power_switch
        where: *power_where
        asym: clone
        params: *power_params
      mount_tl:
        what: mounting_hole_m2
        where: *mount_tl_where
        asym: clone
      mount_tr:
        what: mounting_hole_m2
        where: *mount_tr_where
        asym: clone
      mount_bl:
        what: mounting_hole_m2
        where: *mount_bl_where
        asym: clone
      mount_br:
        what: mounting_hole_m2
        where: *mount_br_where
        asym: clone
